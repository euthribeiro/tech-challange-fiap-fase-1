services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_wrench
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_wrench"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Database=Host=db;Port=5432;Database=db_wrench;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure:5

volumes:
  pgdata:
